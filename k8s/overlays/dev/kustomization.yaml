apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: status-dev

patches:
  - path: patch-replicas.yaml
    target:
      kind: Deployment
      name: gitops-status-demo

configMapGenerator:
  - name: app-config
    literals:
      - ENV=development
      - APP_COLOR=green
