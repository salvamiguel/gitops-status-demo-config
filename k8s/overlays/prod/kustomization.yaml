apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: status-prod

patches:
  - path: patch-replicas.yaml
    target:
      kind: Rollout
      name: gitops-status-demo

configMapGenerator:
  - name: app-config
    literals:
      - ENV=production
      - APP_COLOR=blue
