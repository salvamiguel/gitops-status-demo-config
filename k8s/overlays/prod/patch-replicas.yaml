apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gitops-status-demo
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: gitops-status-demo
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
